<!doctype html>
<html>
  <head>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      #token { word-break: break-all; background: #f0f0f0; padding: 10px; margin-top: 10px; border-radius: 4px; }
      button { margin-top: 10px; padding: 8px 16px; cursor: pointer; margin-right: 8px; }
    </style>

    <script
      defer
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_d2FybS10cmVlZnJvZy03Ny5jbGVyay5hY2NvdW50cy5kZXYk"
      src="https://warm-treefrog-77.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
      type="text/javascript"
    ></script>
  </head>
  <body>
    <h2>BreachLab — Get Bearer Token</h2>
    <div id="sign-in"></div>
    <div id="output" style="display: none">
      <button onclick="getToken()">Get Bearer Token</button>
      <button onclick="window.clerk.signOut().then(() => location.reload())">Sign Out</button>
      <pre id="token"></pre>
    </div>

    <script>
      window.addEventListener("load", async () => {
        await window.Clerk.load();

        if (window.Clerk.user) {
          document.getElementById("output").style.display = "block";
        } else {
          await window.Clerk.redirectToSignIn({ redirectUrl: window.location.href });
        }
      });

      async function getToken() {
        const token = await window.Clerk.session.getToken();
        const el = document.getElementById("token");
        el.textContent = token.trim();

        // auto-copy to clipboard
        navigator.clipboard.writeText(token.trim()).then(() => {
          el.style.background = "#d4edda";
          setTimeout(() => el.style.background = "#f0f0f0", 1500);
        });
      }
    </script>
  </body>
</html>
